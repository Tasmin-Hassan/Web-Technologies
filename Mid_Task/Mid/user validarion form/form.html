<!DOCTYPE html>
<html>
    <head>
        <title>
            registration form
        </title>
    </head>
    <body>
         <h1>User Registration Form</h1>
         <form onsubmit="return validform()">


            <!--Full Name-->
            Full Name :<br>
            <input type="text" placeholder="Enter your name" id="fullName">
            <span id="NameError"></span><br><br>

              <!--Email-->
              Email:<br>
              <input type ="text" placeholder="Enter your email" id="email">
              <span id="EmailError"></span><br><br>


             <!--Passwordort-->
             Password:<br>
             <input type ="password" placeholder="Enter your password" id="password">
             <span id="PasswordError"></span><br><br>

              <!--Confirm Password-->
              Confirm Password:<br>
              <input type ="password" placeholder="Enter your confirm password" id="Cpassword">
             <span id="CPasswordError"></span><br><br>


               <!--Gender-->
               Gender:<br>
              Male<input type="radio" name="gender" value="Male" id="male">
              Female <input type="radio" name="gender" value="Female" id="female">
              Others <input type="radio" name="gender"  value="Others" id="others">
               <span id ="genderError"></span><br><br>






               <!--Gender:<br>
               <select id ="gender">
                <option value="">Select</option>
                <option>Male</option>
                <option>Female</option>
                <option>Others</option>
               </select>
               <span id ="genderError"></span><br><br>
               >


                 <--Date Of Birth-->
                 Date Of Birth:<br>
                 <input type ="date" placeholder="DD-MM-YYYY" id="Date">
                 <span id="DateError"></span><br><br>


                 <!--Submit-->
                 <input type ="submit" value="Submit">


         </form>

         <script src="validation.js"> </script>
    </body>
</html>
